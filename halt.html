<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HACF_MAINFRAME_v9</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #overlay {
            position: absolute; width: 100%; height: 100%; z-index: 100;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: radial-gradient(circle, #1a0000 0%, #000 100%);
            color: #ff0000; text-align: center;
        }
        button {
            background: none; border: 1px solid #ff0000; color: #ff0000;
            padding: 20px 50px; cursor: pointer; font-size: 1.2rem;
            letter-spacing: 5px; box-shadow: 0 0 20px rgba(255,0,0,0.2);
            transition: 0.3s;
        }
        button:hover { background: #ff0000; color: #000; }
        #signal-meter { width: 200px; height: 4px; background: #200; margin-top: 20px; }
        #signal-fill { height: 100%; background: #f00; width: 0%; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="text-shadow: 0 0 20px #f00;">SIGNAL_RECOVERY_v9</h1>
    <button id="startBtn">INITIALIZE</button>
    <div id="signal-meter"><div id="signal-fill"></div></div>
    <p style="font-size: 10px; margin-top: 10px;">AWAITING SYSTEM AUDIO (STEREO MIX)</p>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, analyser, dataArray;
    let clock = new THREE.Clock();
    let lastSwitch = 0;

    async function init() {
        try {
            // Requesting audio - This triggers the browser popup
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new AudioContext();
            const source = audioCtx.createMediaStreamSource(stream);
            
            // Add a Gain Node to boost quiet Spotify signals
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = 3.0; 

            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            
            source.connect(gainNode);
            gainNode.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);

            document.getElementById('overlay').style.display = 'none';
            setupVisuals();
            animate();
        } catch (err) {
            alert("AUDIO BLOCKED: Ensure you are on HTTPS and allowed mic access.");
            console.error(err);
        }
    }

    function setupVisuals() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;

        renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            preserveDrawingBuffer: true // Required for the 'smear' effect
        });
        renderer.autoClearColor = false;
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Create horizontal "Data Traces"
        const group = new THREE.Group();
        for (let i = 0; i < 400; i++) {
            const geo = new THREE.PlaneGeometry(Math.random() * 30 + 5, 0.05);
            const mat = new THREE.MeshBasicMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending
            });
            const trace = new THREE.Mesh(geo, mat);
            trace.position.set(
                (Math.random() - 0.5) * 120,
                (Math.random() - 0.5) * 6, // Concentrated in a thin horizontal band
                (Math.random() - 0.5) * 200
            );
            trace.userData.speed = Math.random() * 0.5 + 0.1;
            scene.add(trace);
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        analyser.getByteFrequencyData(dataArray);
        const time = clock.getElapsedTime();

        // Scene Change every 20 seconds
        if (time - lastSwitch > 20) {
            lastSwitch = time;
            camera.position.set((Math.random()-0.5)*30, (Math.random()-0.5)*10, 50);
        }

        // The "Feedback Loop" - This creates the light trails
        const fadeGeo = new THREE.PlaneGeometry(2000, 2000);
        const fadeMat = new THREE.MeshBasicMaterial({ 
            color: 0x000000, 
            transparent: true, 
            opacity: 0.12 // Lower = longer trails
        });
        const fadeMesh = new THREE.Mesh(fadeGeo, fadeMat);
        fadeMesh.position.z = -1;
        camera.add(fadeMesh);

        // Audio Data Logic
        let bass = dataArray[2] / 255;
        document.getElementById('signal-fill').style.width = (bass * 100) + "%";

        scene.children.forEach(child => {
            if (child instanceof THREE.Mesh && child.geometry instanceof THREE.PlaneGeometry && child !== fadeMesh) {
                // Velocity tied to music
                child.position.z += child.userData.speed + (bass * 3);
                
                // Reset loop
                if (child.position.z > 50) child.position.z = -150;

                // Scale width and brightness based on frequency
                child.scale.x = 1 + (bass * 4);
                child.material.opacity = 0.2 + (bass * 0.8);
            }
        });

        // Camera drift and "Glitch" shake
        if (bass > 0.8) {
            camera.position.x += (Math.random() - 0.5) * 2;
        }
        camera.lookAt(0, 0, 0);

        renderer.render(scene, camera);
    }

    document.getElementById('startBtn').addEventListener('click', init);
</script>
</body>
</html>

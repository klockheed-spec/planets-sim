    function createVolumetricField() {
        if (points) scene.remove(points);

        const count = 200; // Fewer particles but larger and textured
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        const sizes = new Float32Array(count); // Per-particle size for the pulse

        for (let i = 0; i < count; i++) {
            // "Lanes" of data
            positions[i * 3] = (Math.random() - 0.5) * 100;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 4; // Flattened to a circuit
            positions[i * 3 + 2] = (Math.random() - 0.5) * 200; // Long lanes
            
            sizes[i] = Math.random() * 20 + 5; // Base texture size
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        // ShaderMaterial for volumetric glow and audio response
        const material = new THREE.ShaderMaterial({
            uniforms: {
                pointTexture: { value: texture },
                bassIntensity: { value: 0 },
                sceneColor: { value: new THREE.Color(0xff2a2a) } // Shift colors here (Red)
            },
            vertexShader: `
                attribute float size;
                uniform float bassIntensity;
                varying float vBass;

                void main() {
                    vBass = bassIntensity;
                    // Scale the particle based on size + current audio bass
                    vec4 mvPosition = modelViewMatrix * vec4( position, 1.0 );
                    gl_PointSize = size * (1.0 + bassIntensity * 2.0);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform sampler2D pointTexture;
                uniform vec3 sceneColor;
                varying float vBass;

                void main() {
                    // Mix the texture with the scene color, brightening with vBass
                    vec4 texColor = texture2D( pointTexture, gl_PointCoord );
                    gl_FragColor = texColor * vec4(sceneColor, 1.0);
                    
                    // The core turns white when vBass is maxed
                    if (vBass > 0.8) {
                        gl_FragColor.rgb += vec3(0.5); // Additive white burn
                    }
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending, // KEY: Overlapping lights "melt" together
            depthWrite: false
        });

        points = new THREE.Points(geometry, material);
        scene.add(points);
    }

    function animate() {
        requestAnimationFrame(animate);
        analyser.getByteFrequencyData(dataArray);
        const time = clock.getElapsedTime();

        // 20-Second Scene Shift
        if (time - lastSwitch > 20) {
            lastSwitch = time;
            // Dramatically change camera, creating a "Glitch" jump
            camera.position.set(Math.random()*20 - 10, Math.random()*5, 50);
            
            // Rebuild the data field for variety
            createVolumetricField();
        }

        // Fade/Trailing logic (Creating the "Film Smeared" effect)
        const fadeGeo = new THREE.PlaneGeometry(2000, 2000);
        const fadeMat = new THREE.MeshBasicMaterial({
            color: 0x000000,
            transparent: true,
            opacity: 0.1 // KEY: Low opacity means longer trails. Set to 1.0 for hard boxes.
        });
        const fadeMesh = new THREE.Mesh(fadeGeo, fadeMat);
        fadeMesh.position.z = -1; // Keep it just behind the camera plane
        camera.add(fadeMesh); // Lock it to the camera

        // Get Bass Intensity (first few bars of frequency)
        let bass = 0;
        for (let i = 0; i < 5; i++) bass += dataArray[i];
        bass = (bass / 5) / 255;

        // Apply audio data to Shader Uniform
        points.material.uniforms.bassIntensity.value = bass;

        // Movement through the field
        points.position.z += 0.3 + (bass * 2.0); // Rushing speed controlled by bass
        
        // Loop particles when they pass the camera
        if (points.position.z > 50) points.position.z = -150;

        // Camera behavior
        camera.position.x = Math.sin(time * 0.1) * 10; // Faint drift
        camera.lookAt(0, 0, 0);

        renderer.render(scene, camera);
    }

    document.getElementById('start').addEventListener('click', init);
</script>
</body>
</html>

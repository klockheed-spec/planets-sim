<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HACF_VOLUMETRIC_v8</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #ui {
            position: absolute; width: 100%; height: 100%; z-index: 100;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: #050000; color: #ff0000; text-align: center;
        }
        button {
            background: #100; border: 1px solid #f00; color: #f00;
            padding: 20px 40px; cursor: pointer; font-size: 1.1rem; letter-spacing: 3px;
            box-shadow: 0 0 15px rgba(255,0,0,0.3); margin: 10px;
        }
        button:hover { background: #f00; color: #000; }
        #status-msg { font-size: 12px; margin-top: 15px; color: #600; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="ui">
    <h1 style="text-shadow: 0 0 20px #f00;">SYSTEM_RECOVERY_v8</h1>
    <button id="initBtn">INITIALIZE SIGNAL</button>
    <div id="status-msg">Awaiting operator input...</div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, analyser, dataArray;
    let clock = new THREE.Clock();

    async function initAudio() {
        const msg = document.getElementById('status-msg');
        try {
            // Attempt to clear any existing hardware locks
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 512;
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);

            document.getElementById('ui').style.display = 'none';
            setupScene();
            animate();
        } catch (err) {
            msg.innerHTML = "ERROR: " + err.name + " <br> CLICK LOCK ICON IN ADDR BAR TO RESET PERMISSIONS";
            console.error(err);
        }
    }

    function setupScene() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 70;

        renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.autoClearColor = false; 
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Volumetric Traces - Using Planes for the "HACF" smear look
        for(let i=0; i<400; i++) {
            const geometry = new THREE.PlaneGeometry(Math.random()*25 + 5, 0.05);
            const material = new THREE.MeshBasicMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide
            });
            const trace = new THREE.Mesh(geometry, material);
            trace.position.set((Math.random()-0.5)*150, (Math.random()-0.5)*8, (Math.random()-0.5)*200);
            trace.userData.speed = Math.random()*0.4 + 0.1;
            scene.add(trace);
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        analyser.getByteFrequencyData(dataArray);
        const time = clock.getElapsedTime();

        // 20-Second Scene Change (Camera Jump)
        if (Math.floor(time) % 20 === 0 && Math.floor(time) !== 0) {
            camera.position.x = (Math.random()-0.5)*40;
            camera.position.y = (Math.random()-0.5)*10;
        }

        // Motion Blur / Smear Effect
        const fadeGeo = new THREE.PlaneGeometry(2000, 2000);
        const fadeMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.15 });
        const fadeMesh = new THREE.Mesh(fadeGeo, fadeMat);
        fadeMesh.position.z = -2;
        camera.add(fadeMesh);

        let bass = dataArray[2] / 255;
        if (isNaN(bass)) bass = 0;

        scene.children.forEach(child => {
            if(child instanceof THREE.Mesh && child.geometry instanceof THREE.PlaneGeometry) {
                // Move towards camera
                child.position.z += child.userData.speed + (bass * 5);
                if(child.position.z > 70) child.position.z = -130;

                // Scale and brighten with music
                child.scale.x = 1 + (bass * 3);
                child.material.opacity = 0.1 + (bass * 0.8);
            }
        });

        // Slight drift
        camera.lookAt(0,0,0);
        renderer.render(scene, camera);
    }

    document.getElementById('initBtn').addEventListener('click', initAudio);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HACF_FINAL_CENTER_TRACE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #010000; font-family: 'Courier New', monospace; }
        #ui {
            position: absolute; width: 100%; height: 100%; z-index: 100;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: #050000; color: #f22;
        }
        button {
            background: #100; border: 1px solid #f22; color: #f22;
            padding: 20px 40px; cursor: pointer; letter-spacing: 5px;
            font-size: 1.2rem; transition: 0.3s;
        }
        button:hover { background: #f22; color: #000; }
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 3px; pointer-events: none; z-index: 50;
        }
    </style>
</head>
<body>

<div class="scanlines"></div>
<div id="ui">
    <h1 style="text-shadow: 0 0 15px #f00; letter-spacing: 5px;">MAINFRAME_ACCESS</h1>
    <button id="startBtn">ENGAGE_SIGNAL</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, head, ribbon, backgroundGroup, clock;
    let path = [];
    const MAX_POINTS = 100;

    function init() {
        clock = new THREE.Clock();
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0000, 0.005); [cite: 2026-03-05]

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 50); 
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        buildBackground();
        createRibbon();
        
        document.getElementById('ui').style.display = 'none';
        animate();
    }

    function buildBackground() {
        backgroundGroup = new THREE.Group();
        const geo = new THREE.BufferGeometry();
        const pos = [];
        for(let i=0; i<3000; i++) {
            pos.push((Math.random()-0.5)*500, (Math.random()-0.5)*500, (Math.random()-0.5)*1000);
        }
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        const mat = new THREE.PointsMaterial({ color: 0x440000, size: 0.3, transparent: true, opacity: 0.5 });
        backgroundGroup.add(new THREE.Points(geo, mat));
        scene.add(backgroundGroup);
    }

    function createRibbon() {
        // Glowing Center Point
        head = new THREE.Mesh(
            new THREE.SphereGeometry(0.2, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        scene.add(head);

        // Ribbon Geometry
        const ribbonGeo = new THREE.PlaneGeometry(1, 1, 1, MAX_POINTS - 1);
        const ribbonMat = new THREE.MeshBasicMaterial({ 
            color: 0xff1100, 
            transparent: true, 
            opacity: 0.9, 
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending 
        });
        ribbon = new THREE.Mesh(ribbonGeo, ribbonMat);
        ribbon.frustumCulled = false; [cite: 2026-03-05]
        scene.add(ribbon);
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        const t = clock.getElapsedTime();

        // 1. ROTATE WORLD Around Fixed Center
        backgroundGroup.rotation.z = Math.sin(t * 0.1) * 0.2;
        backgroundGroup.rotation.y = Math.cos(t * 0.05) * 0.15;
        ribbon.rotation.z = backgroundGroup.rotation.z;
        ribbon.rotation.y = backgroundGroup.rotation.y;

        // 2. MOVE BACKGROUND
        backgroundGroup.position.z += 90 * delta;
        if (backgroundGroup.position.z > 500) backgroundGroup.position.z = 0;

        // 3. WIDENING RIBBON LOGIC
        path.unshift(new THREE.Vector3(0, 0, 0));
        if (path.length > MAX_POINTS) path.pop();

        const positions = ribbon.geometry.attributes.position.array;
        for (let i = 0; i < path.length; i++) {
            path[i].z += 90 * delta; 
            
            const p = path[i];
            // Ribbon gets wider as it moves from the center (Z=0) to the camera (Z=50)
            const width = 0.05 + (p.z * 0.05); 
            
            const idx = i * 6;
            positions[idx + 0] = p.x - width;
            positions[idx + 1] = p.y;
            positions[idx + 2] = p.z;

            positions[idx + 3] = p.x + width;
            positions[idx + 4] = p.y;
            positions[idx + 5] = p.z;
        }
        ribbon.geometry.attributes.position.needsUpdate = true;

        renderer.render(scene, camera);
    }

    document.getElementById('startBtn').addEventListener('click', init);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>

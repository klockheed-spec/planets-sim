<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HACF_CENTERED_RIBBON</title>
    <style>
        body { margin: 0; overflow: hidden; background: #010000; }
        #ui {
            position: absolute; width: 100%; height: 100%; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.8); color: #f22; font-family: monospace;
        }
        button {
            background: none; border: 1px solid #f22; color: #f22; padding: 15px 30px;
            cursor: pointer; letter-spacing: 5px; text-transform: uppercase;
        }
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 3px; pointer-events: none; z-index: 5;
        }
    </style>
</head>
<body>

<div class="scanlines"></div>
<div id="ui"><button id="start">INITIALIZE_CENTER_TRACE</button></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
    import { RenderPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js';

    let scene, camera, renderer, composer, clock, head, ribbon, backgroundGroup;
    let path = [];
    const MAX_POINTS = 200; // Shorter, high-detail buffer for the ribbon

    function init() {
        clock = new THREE.Clock();
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0000, 0.005); [cite: 2026-03-05]

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 50); // Camera is static, looking at origin
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        const renderPass = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.5, 0.4, 0.1);
        bloomPass.threshold = 0.0;
        bloomPass.strength = 2.2; 
        bloomPass.radius = 0.8;

        composer = new EffectComposer(renderer);
        composer.addPass(renderPass);
        composer.addPass(bloomPass);

        buildBackground();
        createRibbon();
        animate();

        document.getElementById('ui').style.display = 'none';
    }

    function buildBackground() {
        backgroundGroup = new THREE.Group();
        const geo = new THREE.BufferGeometry();
        const pos = [];
        for(let i=0; i<4000; i++) {
            pos.push((Math.random()-0.5)*400, (Math.random()-0.5)*400, (Math.random()-0.5)*1000);
        }
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        const mat = new THREE.PointsMaterial({ color: 0x550000, size: 0.2, transparent: true, opacity: 0.5 });
        const points = new THREE.Points(geo, mat);
        backgroundGroup.add(points);
        scene.add(backgroundGroup);
    }

    function createRibbon() {
        // HEAD stays at center
        head = new THREE.Mesh(
            new THREE.SphereGeometry(0.25, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        scene.add(head);

        // Ribbon Geometry
        const ribbonGeo = new THREE.PlaneGeometry(1, 1, 1, MAX_POINTS - 1);
        const ribbonMat = new THREE.MeshBasicMaterial({ 
            color: 0xff1100, 
            transparent: true, 
            opacity: 0.9, 
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending 
        });
        ribbon = new THREE.Mesh(ribbonGeo, ribbonMat);
        ribbon.frustumCulled = false; [cite: 2026-03-05]
        scene.add(ribbon);
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        const t = clock.getElapsedTime();

        // 1. ENVIRONMENT MOVEMENT: Move the world toward the camera
        backgroundGroup.position.z += 60 * delta;
        if (backgroundGroup.position.z > 500) backgroundGroup.position.z = 0;

        // 2. 3D ROTATION: Tilt the world, not the dot
        backgroundGroup.rotation.z = Math.sin(t * 0.2) * 0.2;
        backgroundGroup.rotation.y = Math.cos(t * 0.1) * 0.1;
        ribbon.rotation.z = backgroundGroup.rotation.z;
        ribbon.rotation.y = backgroundGroup.rotation.y;

        // 3. JITTER: Subtle head flicker to keep it centered but "alive"
        head.position.x = Math.sin(t * 10) * 0.05;
        head.position.y = Math.cos(t * 10) * 0.05;

        // 4. RIBBON UPDATE (Infinite growth feel)
        // We add a new point at the head and move existing points away
        path.unshift(new THREE.Vector3(head.position.x, head.position.y, 0));
        if (path.length > MAX_POINTS) path.pop();

        const positions = ribbon.geometry.attributes.position.array;
        for (let i = 0; i < path.length; i++) {
            // Move points backward in Z space
            path[i].z += 60 * delta; 
            
            const p = path[i];
            // WIDTH LOGIC: Widens as Z increases (gets closer to camera)
            const width = 0.1 + (p.z * 0.03); 
            
            const idx = i * 6;
            positions[idx + 0] = p.x - width;
            positions[idx + 1] = p.y;
            positions[idx + 2] = p.z;

            positions[idx + 3] = p.x + width;
            positions[idx + 4] = p.y;
            positions[idx + 5] = p.z;
        }
        ribbon.geometry.attributes.position.needsUpdate = true;

        composer.render();
    }

    document.getElementById('start').addEventListener('click', init);
</script>
</body>
</html>

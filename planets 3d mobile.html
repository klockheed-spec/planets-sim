<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solaris - Core Restoration</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; color: white; position: fixed; width: 100%; height: 100%; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; touch-action: none; }
        
        .ui-panel { 
            position: absolute; top: 10px; right: 10px; 
            background: rgba(10, 10, 15, 0.95); padding: 15px; 
            border-radius: 12px; border: 1px solid #00ffcc44; width: 220px;
            box-shadow: 0 0 40px rgba(0,0,0,0.7); z-index: 100;
        }
        .ui-panel.hidden { transform: translateX(300px); }
        .ui-toggle {
            position: absolute; top: 15px; right: 15px;
            width: 40px; height: 40px; background: #111; border: 1px solid #00ffcc;
            border-radius: 50%; color: #00ffcc; font-size: 18px; cursor: pointer; z-index: 101;
            display: flex; align-items: center; justify-content: center;
        }
        input[type=range] { width: 100%; margin: 10px 0; cursor: pointer; accent-color: #00ffcc; }
        label { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: #00ffcc; display: block; }
        button { 
            width: 100%; padding: 10px; background: #111; color: #fff; 
            border: 1px solid #333; border-radius: 6px; cursor: pointer; margin-top: 5px; font-size: 9px; text-transform: uppercase;
        }
        #popCount { position: absolute; top: 20px; left: 20px; font-size: 12px; color: #555; pointer-events: none; }
        .help-text {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            font-size: 9px; text-transform: uppercase; color: rgba(0, 255, 204, 0.5); text-align: center; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="uiToggle" class="ui-toggle" onclick="toggleUI()">⚙</div>
<div class="ui-panel" id="panel">
    <label>Zoom Level: <span id="zDisp">800</span></label>
    <input type="range" id="zoomSlider" min="300" max="3000" step="50" value="800">
    <label>Time Speed: <span id="tDisp">1.0</span>x</label>
    <input type="range" id="tSlider" min="0" max="4" step="0.1" value="1">
    <label>Star Mass: <span id="mDisp">5000</span></label>
    <input type="range" id="massSlider" min="500" max="150000" step="500" value="5000">
    <button onclick="triggerSupernova()">Supernova</button>
    <button onclick="resetSim()">Deep Reset</button>
</div>

<div id="popCount">Planets: 0 / 100</div>
<div class="help-text">Left Click: Spawn & Size | Right Click: Rotate</div>
<canvas id="canvas"></canvas>

<script>
window.oncontextmenu = (e) => { e.preventDefault(); return false; };
const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
const popCountDisp = document.getElementById('popCount');

let planets = [], bgStars = [];
let mainStar = { x: 0, y: 0, z: 0, mass: 5000, radius: 20, isBlackHole: false };

const MAX_PLANETS = 100, BH_THRESHOLD = 150000, BOUNDARY = 30000, G = 1.2;
let timeScale = 1.0, angleX = 0, angleY = 0, fov = 800;
let isDragging = false, mStart = {x:0, y:0}, mCurrent = {x:0, y:0}, touchMode = "size", spawnRadius = 5;

function toggleUI() { document.getElementById('panel').classList.toggle('hidden'); }
function initStars() {
    bgStars = [];
    for(let i=0; i<300; i++) bgStars.push({ x:(Math.random()-0.5)*50000, y:(Math.random()-0.5)*50000, z:(Math.random()-0.5)*50000, b:0.3+Math.random()*0.4 });
}
function resize() { 
    const r = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * r; canvas.height = window.innerHeight * r;
    ctx.setTransform(r, 0, 0, r, 0, 0); initStars();
}
window.addEventListener('resize', resize); resize();

function project(x, y, z) {
    let x1 = x * Math.cos(angleY) + z * Math.sin(angleY), z1 = z * Math.cos(angleY) - x * Math.sin(angleY);
    let y2 = y * Math.cos(angleX) - z1 * Math.sin(angleX), z2 = z1 * Math.cos(angleX) + y * Math.sin(angleX);
    const scale = fov / (fov + z2);
    return { x: x1 * scale + window.innerWidth/2, y: y2 * scale + window.innerHeight/2, scale, z: z2 };
}

function unproject(screenX, screenY) {
    let nx = (screenX - window.innerWidth/2) / (fov / fov); // Normalize to FOV
    let ny = (screenY - window.innerHeight/2) / (fov / fov);
    let y1 = ny * Math.cos(-angleX), z1 = ny * Math.sin(-angleX);
    let xF = nx * Math.cos(-angleY) + z1 * Math.sin(-angleY), zF = z1 * Math.cos(-angleY) - nx * Math.sin(-angleY);
    return { x: xF, y: y1, z: zF };
}

document.getElementById('zoomSlider').oninput = (e) => { fov = parseInt(e.target.value); document.getElementById('zDisp').innerText = fov; };
document.getElementById('tSlider').oninput = (e) => { timeScale = parseFloat(e.target.value); document.getElementById('tDisp').innerText = timeScale.toFixed(1); };
document.getElementById('massSlider').oninput = (e) => { mainStar.mass = parseInt(e.target.value); updateStarProps(); };

canvas.addEventListener('pointerdown', (e) => {
    isDragging = true;
    mStart = {x: e.clientX, y: e.clientY}; mCurrent = {...mStart};
    touchMode = (e.button === 0) ? "size" : "rotate";
});

window.addEventListener('pointermove', (e) => {
    if (!isDragging) return;
    if (touchMode === "rotate") {
        angleY += (e.clientX - mCurrent.x) * 0.007;
        angleX += (e.clientY - mCurrent.y) * 0.007;
    } else {
        spawnRadius = Math.min(40, Math.max(3, Math.hypot(e.clientX - mStart.x, e.clientY - mStart.y) / 4));
    }
    mCurrent = {x: e.clientX, y: e.clientY};
});

window.addEventListener('pointerup', (e) => {
    if (isDragging && touchMode === "size" && planets.length < MAX_PLANETS) {
        const pos = unproject(mStart.x, mStart.y);
        const dist = Math.sqrt(pos.x**2 + pos.y**2 + pos.z**2);
        const spd = Math.sqrt((G * mainStar.mass) / Math.max(50, dist));
        planets.push({ x: pos.x, y: pos.y, z: pos.z, radius: spawnRadius, mass: Math.PI * spawnRadius**2, vx: -pos.y/Math.max(1,dist)*spd, vy: pos.x/Math.max(1,dist)*spd, vz: 0, color: `hsl(${Math.random()*360},90%,70%)`, history: [], dead: false });
    }
    isDragging = false; spawnRadius = 5;
});

function physics() {
    const substeps = 4, dt = (0.1 * timeScale) / substeps;
    for (let s = 0; s < substeps; s++) {
        for (let i = 0; i < planets.length; i++) {
            let p = planets[i]; if (p.dead) continue;
            const d = Math.sqrt(p.x**2 + p.y**2 + p.z**2);
            if (d < mainStar.radius) { p.dead = true; if (!mainStar.isBlackHole) mainStar.mass += p.mass * 0.1; continue; }
            if (d > BOUNDARY || isNaN(d)) { p.dead = true; continue; }
            const acc = Math.min(((mainStar.isBlackHole ? 3.5 : G) * mainStar.mass) / (d*d + 20), 50);
            p.vx -= acc * (p.x / (d+0.1)) * dt; p.vy -= acc * (p.y / (d+0.1)) * dt; p.vz -= acc * (p.z / (d+0.1)) * dt;
            for (let j = i+1; j < planets.length; j++) {
                let o = planets[j]; if (o.dead) continue;
                const dx=o.x-p.x, dy=o.y-p.y, dz=o.z-p.z, dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
                if (dist < (p.radius + o.radius)) merge(p.radius > o.radius ? p : o, p.radius > o.radius ? o : p);
                else {
                    const f = (G * p.mass * o.mass) / (dist*dist + 20);
                    p.vx += (f * dx / dist) / p.mass * dt; o.vx -= (f * dx / dist) / o.mass * dt;
                }
            }
            p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt;
        }
        planets = planets.filter(p => !p.dead);
    }
    planets.forEach(p => { p.history.push({x: p.x, y: p.y, z: p.z}); if (p.history.length > 30) p.history.shift(); });
    popCountDisp.innerText = `Planets: ${planets.length} / ${MAX_PLANETS}`;
}

function merge(p1, p2) { p1.mass += p2.mass; p1.radius = Math.sqrt(p1.mass / Math.PI); p2.dead = true; }
function updateStarProps() { mainStar.isBlackHole = mainStar.mass >= BH_THRESHOLD; mainStar.radius = mainStar.isBlackHole ? 12 : 10 + Math.pow(mainStar.mass, 0.38); document.getElementById('mDisp').innerText = Math.floor(mainStar.mass); }
function triggerSupernova() { planets = []; mainStar.mass = BH_THRESHOLD; updateStarProps(); }
function resetSim() { planets = []; mainStar.mass = 5000; updateStarProps(); angleX = 0; angleY = 0; }

function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    const renderList = [ ...bgStars.map(s => ({ ...s, sortZ: project(s.x, s.y, s.z).z, type:'bg' })), { ...mainStar, sortZ: project(mainStar.x, mainStar.y, mainStar.z).z, type:'star' } ];
    planets.forEach(p => {
        if (p.history.length > 1) {
            for (let i = 0; i < p.history.length - 1; i++) {
                const p1 = project(p.history[i].x, p.history[i].y, p.history[i].z), p2 = project(p.history[i+1].x, p.history[i+1].y, p.history[i+1].z);
                renderList.push({ type: 'trail', color: p.color, alpha: i/p.history.length, pt1: p1, pt2: p2, sortZ: ((p1.z + p2.z)/2) + 10 });
            }
        }
        renderList.push({ ...p, type:'planet', sortZ: project(p.x, p.y, p.z).z });
    });

    renderList.sort((a, b) => b.sortZ - a.sortZ).forEach(obj => {
        const pr = (obj.type === 'trail') ? null : project(obj.x, obj.y, obj.z);
        if (obj.type === 'bg') {
            ctx.globalAlpha = obj.b; ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(pr.x, pr.y, 1 * pr.scale, 0, 6.28); ctx.fill();
        } else if (obj.type === 'trail') {
            ctx.globalCompositeOperation = 'screen'; ctx.strokeStyle = obj.color; ctx.globalAlpha = obj.alpha * 0.4; ctx.lineWidth = 2 * obj.pt1.scale;
            ctx.beginPath(); ctx.moveTo(obj.pt1.x, obj.pt1.y); ctx.lineTo(obj.pt2.x, obj.pt2.y); ctx.stroke(); ctx.globalCompositeOperation = 'source-over';
        } else {
            if (pr.scale <= 0) return;
            ctx.globalAlpha = 1; ctx.fillStyle = obj.isBlackHole ? "#000" : (obj.color || "#fff");
            ctx.beginPath(); ctx.arc(pr.x, pr.y, obj.radius * pr.scale, 0, 6.28); ctx.fill();
            if (obj.isBlackHole) { ctx.strokeStyle = "#fff"; ctx.lineWidth = 1; ctx.stroke(); }
        }
    });
    if (isDragging && touchMode === "size") {
        ctx.strokeStyle = "#00ffcc"; ctx.setLineDash([5, 5]); ctx.beginPath(); ctx.arc(mStart.x, mStart.y, spawnRadius, 0, 6.28); ctx.stroke(); ctx.setLineDash([]);
    }
    physics(); requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>

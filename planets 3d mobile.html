<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solaris - Reverted Stable Build</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; color: white; position: fixed; width: 100%; height: 100%; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
        .ui { 
            position: absolute; top: 10px; right: 10px; 
            background: rgba(10, 10, 15, 0.95); padding: 15px; 
            border-radius: 12px; border: 1px solid #00ffcc44; width: 180px;
            z-index: 100; box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ui.minimized { transform: translateX(210px); }
        .min-btn {
            position: absolute; left: -40px; top: 0; width: 35px; height: 35px;
            background: rgba(10, 10, 15, 0.95); border: 1px solid #00ffcc44;
            border-radius: 8px; color: #00ffcc; cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
        }
        input { width: 100%; margin: 8px 0; accent-color: #00ffcc; }
        label { font-size: 9px; text-transform: uppercase; color: #00ffcc; letter-spacing: 1.5px; display: block; }
        button.reset { width: 100%; padding: 8px; background: #111; color: #fff; border: 1px solid #333; border-radius: 6px; font-size: 9px; margin-top: 5px; cursor: pointer; }
        #pop { position: absolute; top: 20px; left: 20px; color: #00ffcc; font-size: 11px; pointer-events: none; text-shadow: 0 0 5px #000; z-index: 50; }
    </style>
</head>
<body>

<div id="pop">SYSTEM STABLE // PLANETS: 0</div>
<div class="ui" id="toolBox">
    <div class="min-btn" onclick="document.getElementById('toolBox').classList.toggle('minimized')">M</div>
    <label>Zoom: <span id="zDisp">1500</span></label>
    <input type="range" id="zoom" min="200" max="2500" value="1500">
    <label>Speed: <span id="sDisp">1.0</span>x</label>
    <input type="range" id="speed" min="0" max="10" step="0.1" value="1">
    <label>Star Mass: <span id="mDispVal">5000</span></label>
    <input type="range" id="mass" min="500" max="150000" step="500" value="5000">
    <label>Trail: <span id="trDisp">30</span></label>
    <input type="range" id="trailLen" min="5" max="200" step="5" value="30">
    <label>Debris Count: <span id="dDisp">4</span></label>
    <input type="range" id="debris" min="2" max="10" value="4">
    <button class="reset" onclick="resetSim()">System Reset</button>
</div>

<canvas id="canvas"></canvas>

<script>
window.oncontextmenu = (e) => { e.preventDefault(); return false; };
const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
let planets = [], stars = [], singularityWaves = [];
let mainStar = { x: 0, y: 0, z: 0, mass: 5000, radius: 20, isBH: false };
let screenFlashAlpha = 0;

const BH_THRESHOLD = 140000, BOUNDARY = 35000, G_SOLAR = 1.3, MUTUAL_G = 0.08;
const MAX_PLANET_RADIUS = 60, MAX_PLANET_MASS = 8000; 
const SHATTER_LIMIT = 100, SHATTER_THRESHOLD_MASS = 3500, COALESCE_DIST_MULT = 1.25, COALESCE_TIME_REQ = 120; 

let viewDist = 1500, timeScale = 1, debrisCount = 4, angleX = 0, angleY = 0, maxTrail = 30;
let isDown = false, isRotating = false, mStart = {x:0, y:0}, mCurrent = {x:0, y:0}, spawnR = 5;

function initStars() {
    stars = [];
    for(let i=0; i<600; i++) {
        let theta = Math.random()*Math.PI*2, phi = Math.acos((Math.random()*2)-1), dist = 10000 + Math.random()*5000;
        stars.push({ x: dist*Math.sin(phi)*Math.cos(theta), y: dist*Math.sin(phi)*Math.sin(theta), z: dist*Math.cos(phi), b: 1.0, sz: 3.5 + Math.random()*4 });
    }
}
initStars();

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize; resize();

function project(x, y, z) {
    let x1 = x * Math.cos(angleY) + z * Math.sin(angleY), z1 = z * Math.cos(angleY) - x * Math.sin(angleY);
    let y2 = y * Math.cos(angleX) - z1 * Math.sin(angleX), z2 = z1 * Math.cos(angleX) + y * Math.sin(angleX);
    const scale = 800 / (viewDist + z2);
    return { x: x1 * scale + canvas.width/2, y: y2 * scale + canvas.height/2, s: scale, z: z2 };
}

function screenToWorld(sx, sy) {
    let nx = (sx - canvas.width/2) * (viewDist / 800);
    let ny = (sy - canvas.height/2) * (viewDist / 800);
    let y1 = ny * Math.cos(-angleX), z1 = ny * Math.sin(-angleX);
    let xW = nx * Math.cos(-angleY) + z1 * Math.sin(-angleY);
    let zW = z1 * Math.cos(-angleY) - nx * Math.sin(-angleY);
    return { x: xW, y: y1, z: zW };
}

canvas.addEventListener('mousedown', e => { isDown=true; mStart={x:e.clientX, y:e.clientY}; mCurrent={x:e.clientX, y:e.clientY}; isRotating=(e.button===2||e.shiftKey); });
window.addEventListener('mousemove', e => { if(!isDown) return; if(isRotating) { angleY+=(e.clientX-mCurrent.x)*0.005; angleX+=(e.clientY-mCurrent.y)*0.005; } else { spawnR=Math.min(MAX_PLANET_RADIUS, Math.max(3, Math.hypot(e.clientX-mStart.x, e.clientY-mStart.y)/5)); } mCurrent={x:e.clientX, y:e.clientY}; });
window.addEventListener('mouseup', e => { if(isDown && !isRotating) { let w=screenToWorld(mStart.x, mStart.y); let d=Math.max(10, Math.sqrt(w.x*w.x+w.y*w.y+w.z*w.z)), v=Math.sqrt((G_SOLAR*mainStar.mass)/d); planets.push({x:w.x, y:w.y, z:w.z, r:spawnR, m:Math.PI*spawnR**2, vx:-w.y/d*v, vy:w.x/d*v, vz:0, c:`hsl(${Math.random()*360}, 80%, 70%)`, h:[], dead:false, cooldown:0, proximityTimer:0}); } isDown=false; isRotating=false; spawnR=5; });

canvas.addEventListener('touchstart', e => { if(e.touches.length===1) { isDown=true; isRotating=false; mStart={x:e.touches[0].clientX, y:e.touches[0].clientY}; mCurrent=mStart; } else if(e.touches.length===2) { isDown=true; isRotating=true; mCurrent={x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2}; } }, {passive:false});
canvas.addEventListener('touchmove', e => { if(e.touches.length===1 && isDown && !isRotating) { spawnR=Math.min(MAX_PLANET_RADIUS, Math.max(3, Math.hypot(e.touches[0].clientX-mStart.x, e.touches[0].clientY-mStart.y)/5)); } else if(e.touches.length===2 && isRotating) { let now={x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2}; angleY+=(now.x-mCurrent.x)*0.01; angleX+=(now.y-mCurrent.y)*0.01; mCurrent=now; } }, {passive:false});
canvas.addEventListener('touchend', e => { if(isDown && !isRotating) { let w=screenToWorld(mStart.x, mStart.y); let d=Math.max(10, Math.sqrt(w.x*w.x+w.y*w.y+w.z*w.z)), v=Math.sqrt((G_SOLAR*mainStar.mass)/d); planets.push({x:w.x, y:w.y, z:w.z, r:spawnR, m:Math.PI*spawnR**2, vx:-w.y/d*v, vy:w.x/d*v, vz:0, c:`hsl(${Math.random()*360}, 80%, 70%)`, h:[], dead:false, cooldown:0, proximityTimer:0}); } isDown=false; isRotating=false; spawnR=5; });

document.getElementById('zoom').oninput = e => { viewDist = 2700 - e.target.value; document.getElementById('zDisp').innerText = e.target.value; };
document.getElementById('speed').oninput = e => { timeScale = +e.target.value; document.getElementById('sDisp').innerText = timeScale.toFixed(1); };
document.getElementById('mass').oninput = e => { mainStar.mass = +e.target.value; updateStar(); };
document.getElementById('trailLen').oninput = e => { maxTrail = +e.target.value; document.getElementById('trDisp').innerText = maxTrail; };
document.getElementById('debris').oninput = e => { debrisCount = +e.target.value; document.getElementById('dDisp').innerText = debrisCount; };

function updateStar() {
    const wasBH = mainStar.isBH;
    mainStar.isBH = mainStar.mass >= BH_THRESHOLD;
    mainStar.radius = mainStar.isBH ? 15 : 10 + Math.pow(mainStar.mass, 0.35);
    document.getElementById('mDispVal').innerText = Math.floor(mainStar.mass);
    document.getElementById('mass').value = mainStar.mass;
    if (mainStar.isBH && !wasBH) { singularityWaves.push({ radius: mainStar.radius, maxRadius: BOUNDARY * 1.5, life: 1 }); screenFlashAlpha = 1.0; }
}

function resetSim() { planets = []; mainStar.mass = 5000; mainStar.isBH = false; updateStar(); angleX = 0; angleY = 0; singularityWaves = []; screenFlashAlpha = 0; }

function shatter(p1, p2) {
    p1.dead = true; p2.dead = true;
    let combinedM = (p1.m + p2.m) * 0.6, fragR = Math.max(1.5, Math.sqrt(combinedM / (debrisCount * Math.PI)));
    for(let i=0; i < debrisCount; i++) {
        let a = (Math.PI*2/debrisCount)*i, k = 4 + Math.random()*4;
        planets.push({ x: p1.x + Math.cos(a)*p1.r, y: p1.y + Math.sin(a)*p1.r, z: p1.z, r: fragR, m: combinedM/debrisCount, vx: (p1.vx+p2.vx)/2 + Math.cos(a)*k, vy: (p1.vy+p2.vy)/2 + Math.sin(a)*k, vz: 0, c: p1.c, h: [], dead: false, cooldown: 40, proximityTimer: 0 });
    }
}

function physicsLoop() {
    const substeps = 8, dt = (0.1 * timeScale) / substeps;
    for (let step = 0; step < substeps; step++) {
        for(let i=0; i<planets.length; i++) {
            let p = planets[i]; if(p.dead) continue;
            if(p.cooldown > 0 && step === 0) p.cooldown--;
            let dStar2 = p.x*p.x + p.y*p.y + p.z*p.z, dStar = Math.max(5, Math.sqrt(dStar2));
            if(dStar < mainStar.radius) { if(!mainStar.isBH) { mainStar.mass += p.m * 0.1; updateStar(); } p.dead = true; continue; }
            if(dStar > BOUNDARY) { p.dead = true; continue; }
            let accStar = (G_SOLAR * mainStar.mass) / (dStar2 + 120);
            p.vx -= accStar * (p.x/dStar) * dt; p.vy -= accStar * (p.y/dStar) * dt; p.vz -= accStar * (p.z/dStar) * dt;
            for(let j=i+1; j<planets.length; j++) {
                let o = planets[j]; if(o.dead) continue;
                let dx=o.x-p.x, dy=o.y-p.y, dz=o.z-p.z, d2=dx*dx+dy*dy+dz*dz, d=Math.sqrt(d2);
                if(d > 0.1) { let f = (MUTUAL_G * p.m * o.m) / (d2 + 60); p.vx += (f * dx / d) / p.m * dt; p.vy += (f * dy / d) / p.m * dt; o.vx -= (f * dx / d) / o.m * dt; o.vy -= (f * dy / d) / o.m * dt; }
                const minDist = p.r + o.r;
                if(d < minDist && p.cooldown === 0 && o.cooldown === 0) {
                    let relV = Math.sqrt((p.vx-o.vx)**2 + (p.vy-o.vy)**2);
                    if(relV > 0.8 && planets.length < SHATTER_LIMIT && p.m < SHATTER_THRESHOLD_MASS && o.m < SHATTER_THRESHOLD_MASS) { shatter(p, o); break; } 
                    else { let totalM = p.m + o.m; p.vx = (p.vx * p.m + o.vx * o.m) / totalM; p.vy = (p.vy * p.m + o.vy * o.m) / totalM; p.m = Math.min(MAX_PLANET_MASS, totalM); p.r = Math.min(MAX_PLANET_RADIUS, Math.sqrt(p.m/Math.PI)); o.dead = true; }
                } else if(d < minDist * COALESCE_DIST_MULT && p.cooldown === 0 && o.cooldown === 0) {
                    p.proximityTimer += timeScale; if(p.proximityTimer > COALESCE_TIME_REQ) { let totalM = p.m + o.m; p.vx = (p.vx * p.m + o.vx * o.m) / totalM; p.vy = (p.vy * p.m + o.vy * o.m) / totalM; p.m = Math.min(MAX_PLANET_MASS, totalM); p.r = Math.min(MAX_PLANET_RADIUS, Math.sqrt(p.m/Math.PI)); p.proximityTimer = 0; o.dead = true; }
                }
            }
            p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt;
        }
        singularityWaves.forEach(w => { w.radius += 800 * dt; w.life = 1 - (w.radius / w.maxRadius); });
        singularityWaves = singularityWaves.filter(w => w.life > 0);
        if (screenFlashAlpha > 0) screenFlashAlpha -= 0.04;
    }
    planets.forEach(p => { p.h.push({x:p.x, y:p.y, z:p.z}); while(p.h.length > maxTrail) p.h.shift(); });
    planets = planets.filter(p => !p.dead);
    document.getElementById('pop').innerText = "OBJECTS: " + planets.length;
}

function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width, canvas.height);
    physicsLoop();
    stars.forEach(s => { const p = project(s.x, s.y, s.z); if (p.s > 0) { ctx.fillStyle = '#fff'; ctx.globalAlpha = 1.0; ctx.beginPath(); ctx.arc(p.x, p.y, s.sz * p.s, 0, 7); ctx.fill(); } });
    singularityWaves.forEach(w => { const p1 = project(mainStar.x, mainStar.y, mainStar.z); if (p1.s > 0) { ctx.beginPath(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 20 * w.life * p1.s; ctx.globalAlpha = w.life; ctx.arc(p1.x, p1.y, w.radius * p1.s, 0, 7); ctx.stroke(); } });
    planets.forEach(p => { if (p.h.length > 1) { const currentScale = project(p.x, p.y, p.z).s; for (let i = 0; i < p.h.length - 1; i++) { const pt1 = project(p.h[i].x, p.h[i].y, p.h[i].z), pt2 = project(p.h[i+1].x, p.h[i+1].y, p.h[i+1].z); if (pt1.s > 0 && pt2.s > 0) { const ratio = i / p.h.length; ctx.beginPath(); ctx.strokeStyle = p.c; ctx.lineWidth = (ratio * 4 + 0.5) * currentScale; ctx.globalAlpha = ratio * 0.4; ctx.moveTo(pt1.x, pt1.y); ctx.lineTo(pt2.x, pt2.y); ctx.stroke(); } } } });
    const sP = project(mainStar.x, mainStar.y, mainStar.z);
    if (sP.s > 0) {
        let grd = ctx.createRadialGradient(sP.x, sP.y, 0, sP.x, sP.y, mainStar.radius * sP.s * 2.5); grd.addColorStop(0, mainStar.isBH ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.5)'); grd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.globalAlpha = 1; ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(sP.x, sP.y, mainStar.radius * sP.s * 2.5, 0, 7); ctx.fill();
        ctx.fillStyle = mainStar.isBH ? '#000' : '#fff'; ctx.beginPath(); ctx.arc(sP.x, sP.y, mainStar.radius * sP.s, 0, 7); ctx.fill();
        if (mainStar.isBH) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke(); }
    }
    planets.forEach(p => { const pP = project(p.x, p.y, p.z); if (pP.s > 0) { let grd = ctx.createRadialGradient(pP.x, pP.y, 0, pP.x, pP.y, p.r * pP.s * 2); grd.addColorStop(0, p.c.replace('80%', '40%')); grd.addColorStop(1, 'rgba(0,0,0,0)'); ctx.globalAlpha = 0.4; ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(pP.x, pP.y, p.r * pP.s * 2, 0, 7); ctx.fill(); ctx.globalAlpha = 1; ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(pP.x, pP.y, p.r * pP.s, 0, 7); ctx.fill(); } });
    if (screenFlashAlpha > 0) { ctx.fillStyle = '#fff'; ctx.globalAlpha = screenFlashAlpha * 0.7; ctx.fillRect(0, 0, canvas.width, canvas.height); }
    if(isDown && !isRotating) { ctx.strokeStyle = '#00ffcc'; ctx.globalAlpha = 0.5; ctx.beginPath(); ctx.arc(mStart.x, mStart.y, spawnR, 0, 7); ctx.stroke(); }
    requestAnimationFrame(draw);
}
draw();
</script>
</body>

<script>
window.oncontextmenu = (e) => { e.preventDefault(); return false; };
const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
let planets = [], stars = [], singularityWaves = [];
let mainStar = { x: 0, y: 0, z: 0, mass: 5000, radius: 20, isBH: false };
let screenFlashAlpha = 0;

const BH_THRESHOLD = 140000, BOUNDARY = 35000, G_SOLAR = 1.3, MUTUAL_G = 0.08;
const MAX_PLANET_RADIUS = 60, MAX_PLANET_MASS = 8000; 
const SHATTER_LIMIT = 100, SHATTER_THRESHOLD_MASS = 3500, COALESCE_DIST_MULT = 1.25, COALESCE_TIME_REQ = 120; 

let viewDist = 1500, timeScale = 1, angleX = 0, angleY = 0, maxTrail = 30;
let isDown = false, isRotating = false, mStart = {x:0, y:0}, mCurrent = {x:0, y:0}, spawnR = 5;

    stars = [];

        let theta = Math.random()*Math.PI*2, phi = Math.acos((Math.random()*2)-1), dist = 10000 + Math.random()*5000;

    }
}
initStars();

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize; resize();

function project(x, y, z) {
    let x1 = x * Math.cos(angleY) + z * Math.sin(angleY), z1 = z * Math.cos(angleY) - x * Math.sin(angleY);
    let y2 = y * Math.cos(angleX) - z1 * Math.sin(angleX), z2 = z1 * Math.cos(angleX) + y * Math.sin(angleX);
    const scale = 800 / (viewDist + z2);
    return { x: x1 * scale + canvas.width/2, y: y2 * scale + canvas.height/2, s: scale, z: z2 };
}

function screenToWorld(sx, sy) {
    let nx = (sx - canvas.width/2) * (viewDist / 800);
    let ny = (sy - canvas.height/2) * (viewDist / 800);
    let y1 = ny * Math.cos(-angleX), z1 = ny * Math.sin(-angleX);
    let xW = nx * Math.cos(-angleY) + z1 * Math.sin(-angleY);
    let zW = z1 * Math.cos(-angleY) - nx * Math.sin(-angleY);
    return { x: xW, y: y1, z: zW };
}

// UNIFIED INPUT HANDLER
canvas.addEventListener('mousedown', e => {
    isDown = true;
    mStart = {x: e.clientX, y: e.clientY};
    mCurrent = {x: e.clientX, y: e.clientY};
    isRotating = (e.button === 2 || e.shiftKey);
});

window.addEventListener('mousemove', e => {
    if(!isDown) return;
    if(isRotating) {
        angleY += (e.clientX - mCurrent.x) * 0.005;
        angleX += (e.clientY - mCurrent.y) * 0.005;
    } else {
        spawnR = Math.min(MAX_PLANET_RADIUS, Math.max(3, Math.hypot(e.clientX - mStart.x, e.clientY - mStart.y) / 5));
    }
    mCurrent = {x: e.clientX, y: e.clientY};
});

window.addEventListener('mouseup', e => {
    if(isDown && !isRotating) {
        let w = screenToWorld(mStart.x, mStart.y);
        let d = Math.max(10, Math.sqrt(w.x*w.x + w.y*w.y + w.z*w.z)), vel = Math.sqrt((G_SOLAR * mainStar.mass) / d);
        planets.push({ x: w.x, y: w.y, z: w.z, r: spawnR, m: Math.PI * spawnR**2, vx: -w.y/d * vel, vy: w.x/d * vel, vz: 0, c: `hsl(${Math.random()*360}, 80%, 70%)`, h: [], dead: false, cooldown: 0, proximityTimer: 0 });
    }
    isDown = false; isRotating = false; spawnR = 5;
});

// TOUCH SUPPORT (Parallel to Mouse)
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if(e.touches.length === 1) {
        isDown = true; isRotating = false;
        mStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
        mCurrent = mStart;
    } else if (e.touches.length === 2) {
        isDown = true; isRotating = true;
        mCurrent = {x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2};
    }
}, {passive: false});

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if(e.touches.length === 1 && isDown && !isRotating) {
        spawnR = Math.min(MAX_PLANET_RADIUS, Math.max(3, Math.hypot(e.touches[0].clientX - mStart.x, e.touches[0].clientY - mStart.y) / 5));
    } else if (e.touches.length === 2 && isRotating) {
        let now = {x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2};
        angleY += (now.x - mCurrent.x) * 0.01;
        angleX += (now.y - mCurrent.y) * 0.01;
        mCurrent = now;
    }
}, {passive: false});

canvas.addEventListener('touchend', e => {
    if(isDown && !isRotating) {
        let w = screenToWorld(mStart.x, mStart.y);
        let d = Math.max(10, Math.sqrt(w.x*w.x + w.y*w.y + w.z*w.z)), vel = Math.sqrt((G_SOLAR * mainStar.mass) / d);
        planets.push({ x: w.x, y: w.y, z: w.z, r: spawnR, m: Math.PI * spawnR**2, vx: -w.y/d * vel, vy: w.x/d * vel, vz: 0, c: `hsl(${Math.random()*360}, 80%, 70%)`, h: [], dead: false, cooldown: 0, proximityTimer: 0 });
    }
    isDown = false; isRotating = false; spawnR = 5;
});

// UI UPDATES
document.getElementById('zoom').oninput = e => { viewDist = 2700 - e.target.value; document.getElementById('zDisp').innerText = e.target.value; };
document.getElementById('speed').oninput = e => { timeScale = +e.target.value; document.getElementById('sDisp').innerText = timeScale.toFixed(1); };
document.getElementById('mass').oninput = e => { mainStar.mass = +e.target.value; updateStar(); };
document.getElementById('trailLen').oninput = e => { maxTrail = +e.target.value; document.getElementById('trDisp').innerText = maxTrail; };

function updateStar() {
    const wasBH = mainStar.isBH;
    mainStar.isBH = mainStar.mass >= BH_THRESHOLD;
    mainStar.radius = mainStar.isBH ? 15 : 10 + Math.pow(mainStar.mass, 0.35);
    document.getElementById('mDispVal').innerText = Math.floor(mainStar.mass);
    document.getElementById('mass').value = mainStar.mass;
    if (mainStar.isBH && !wasBH) { singularityWaves.push({ radius: mainStar.radius, maxRadius: BOUNDARY * 1.5, life: 1 }); screenFlashAlpha = 1.0; }
}

function resetSim() { planets = []; mainStar.mass = 5000; mainStar.isBH = false; updateStar(); angleX = 0; angleY = 0; singularityWaves = []; screenFlashAlpha = 0; }

function shatter(p1, p2) {
    p1.dead = true; p2.dead = true;
    let combinedM = (p1.m + p2.m) * 0.6, fragR = Math.max(1.5, Math.sqrt(combinedM / (4 * Math.PI)));
    for(let i=0; i < 4; i++) {
        let a = (Math.PI*2/4)*i, k = 4 + Math.random()*4;
        planets.push({ x: p1.x + Math.cos(a)*p1.r, y: p1.y + Math.sin(a)*p1.r, z: p1.z, r: fragR, m: combinedM/4, vx: (p1.vx+p2.vx)/2 + Math.cos(a)*k, vy: (p1.vy+p2.vy)/2 + Math.sin(a)*k, vz: 0, c: p1.c, h: [], dead: false, cooldown: 40, proximityTimer: 0 });
    }
}

function physicsLoop() {
    const substeps = 8, dt = (0.1 * timeScale) / substeps;
    for (let step = 0; step < substeps; step++) {
        for(let i=0; i<planets.length; i++) {
            let p = planets[i]; if(p.dead) continue;
            if(p.cooldown > 0 && step === 0) p.cooldown--;
            let dStar2 = p.x*p.x + p.y*p.y + p.z*p.z, dStar = Math.max(5, Math.sqrt(dStar2));
            if(dStar < mainStar.radius) { if(!mainStar.isBH) { mainStar.mass += p.m * 0.1; updateStar(); } p.dead = true; continue; }
            if(dStar > BOUNDARY) { p.dead = true; continue; }
            let accStar = (G_SOLAR * mainStar.mass) / (dStar2 + 120);
            p.vx -= accStar * (p.x/dStar) * dt; p.vy -= accStar * (p.y/dStar) * dt; p.vz -= accStar * (p.z/dStar) * dt;
            for(let j=i+1; j<planets.length; j++) {
                let o = planets[j]; if(o.dead) continue;
                let dx=o.x-p.x, dy=o.y-p.y, dz=o.z-p.z, d2=dx*dx+dy*dy+dz*dz, d=Math.sqrt(d2);
                if(d > 0.1) {
                    let force = (MUTUAL_G * p.m * o.m) / (d2 + 60);
                    p.vx += (force * dx / d) / p.m * dt; p.vy += (force * dy / d) / p.m * dt;
                    o.vx -= (force * dx / d) / o.m * dt; o.vy -= (force * dy / d) / o.m * dt;
                }
                const minDist = p.r + o.r;
                if(d < minDist && p.cooldown === 0 && o.cooldown === 0) {
                    let relV = Math.sqrt((p.vx-o.vx)**2 + (p.vy-o.vy)**2);
                    if(relV > 0.8 && planets.length < SHATTER_LIMIT && p.m < SHATTER_THRESHOLD_MASS && o.m < SHATTER_THRESHOLD_MASS) { shatter(p, o); break; } 
                    else { 
                        let totalM = p.m + o.m; p.vx = (p.vx * p.m + o.vx * o.m) / totalM; p.vy = (p.vy * p.m + o.vy * o.m) / totalM;
                        p.m = Math.min(MAX_PLANET_MASS, totalM); p.r = Math.min(MAX_PLANET_RADIUS, Math.sqrt(p.m/Math.PI)); o.dead = true; 
                    }
                } else if(d < minDist * COALESCE_DIST_MULT && p.cooldown === 0 && o.cooldown === 0) {
                    p.proximityTimer += timeScale; if(p.proximityTimer > COALESCE_TIME_REQ) {
                        let totalM = p.m + o.m; p.vx = (p.vx * p.m + o.vx * o.m) / totalM; p.vy = (p.vy * p.m + o.vy * o.m) / totalM;
                        p.m = Math.min(MAX_PLANET_MASS, totalM); p.r = Math.min(MAX_PLANET_RADIUS, Math.sqrt(p.m/Math.PI)); p.proximityTimer = 0; o.dead = true;
                    }
                }
            }
            p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt;
        }
        singularityWaves.forEach(w => { w.radius += 800 * dt * timeScale; w.life = 1 - (w.radius / w.maxRadius); });
        singularityWaves = singularityWaves.filter(w => w.life > 0);
        if (screenFlashAlpha > 0) screenFlashAlpha -= 0.04 * timeScale;
    }
    planets.forEach(p => { p.h.push({x:p.x, y:p.y, z:p.z}); while(p.h.length > maxTrail) p.h.shift(); });
    planets = planets.filter(p => !p.dead);
    document.getElementById('pop').innerText = "OBJECTS: " + planets.length;
}

function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width, canvas.height);
    physicsLoop();
    stars.forEach(s => {
        const p = project(s.x, s.y, s.z);
        if (p.s > 0) { ctx.fillStyle = '#fff'; ctx.globalAlpha = s.b; ctx.beginPath(); ctx.arc(p.x, p.y, s.sz * p.s, 0, 7); ctx.fill(); }
    });
    singularityWaves.forEach(w => {
        const p1 = project(mainStar.x, mainStar.y, mainStar.z);
        if (p1.s > 0) { 
            ctx.beginPath(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 20 * w.life * p1.s; 
            ctx.globalAlpha = w.life; ctx.arc(p1.x, p1.y, w.radius * p1.s, 0, 7); ctx.stroke(); 
        }
    });
    planets.forEach(p => {
        if (p.h.length > 1) {
            const currentScale = project(p.x, p.y, p.z).s;
            for (let i = 0; i < p.h.length - 1; i++) {
                const pt1 = project(p.h[i].x, p.h[i].y, p.h[i].z), pt2 = project(p.h[i+1].x, p.h[i+1].y, p.h[i+1].z);
                if (pt1.s > 0 && pt2.s > 0) {
                    const ratio = i / p.h.length;
                    ctx.beginPath(); ctx.strokeStyle = p.c; ctx.lineWidth = (ratio * 4 + 0.5) * currentScale; ctx.globalAlpha = ratio * 0.4;
                    ctx.moveTo(pt1.x, pt1.y); ctx.lineTo(pt2.x, pt2.y); ctx.stroke();
                }
            }
        }
    });
    const sP = project(mainStar.x, mainStar.y, mainStar.z);
    if (sP.s > 0) {
        let grd = ctx.createRadialGradient(sP.x, sP.y, 0, sP.x, sP.y, mainStar.radius * sP.s * 2.5);
        grd.addColorStop(0, mainStar.isBH ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.5)');
        grd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.globalAlpha = 1; ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(sP.x, sP.y, mainStar.radius * sP.s * 2.5, 0, 7); ctx.fill();
        ctx.fillStyle = mainStar.isBH ? '#000' : '#fff'; ctx.beginPath(); ctx.arc(sP.x, sP.y, mainStar.radius * sP.s, 0, 7); ctx.fill();
        if (mainStar.isBH) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke(); }
    }
    planets.forEach(p => {
        const pP = project(p.x, p.y, p.z);
        if (pP.s > 0) {
            let grd = ctx.createRadialGradient(pP.x, pP.y, 0, pP.x, pP.y, p.r * pP.s * 2);
            grd.addColorStop(0, p.c.replace('80%', '40%')); grd.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.globalAlpha = 0.4; ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(pP.x, pP.y, p.r * pP.s * 2, 0, 7); ctx.fill();
            ctx.globalAlpha = 1; ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(pP.x, pP.y, p.r * pP.s, 0, 7); ctx.fill();
        }
    });
    if (screenFlashAlpha > 0) { ctx.fillStyle = '#fff'; ctx.globalAlpha = screenFlashAlpha * 0.7; ctx.fillRect(0, 0, canvas.width, canvas.height); }
    if(isDown && !isRotating) { ctx.strokeStyle = '#00ffcc'; ctx.globalAlpha = 0.5; ctx.beginPath(); ctx.arc(mStart.x, mStart.y, spawnR, 0, 7); ctx.stroke(); }
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>K-SPEC // ORBIT_PLACEMENT_FIXED</title>
    <style>
        body { margin: 0; background: #000; color: #0ff; font-family: sans-serif; overflow: hidden; touch-action: none; height: 100dvh; width: 100vw; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        .panel { position: absolute; z-index: 100; width: 200px; max-width: 40vw; pointer-events: auto; }
        .left-panel { top: 10px; left: 10px; }
        .right-panel { top: 10px; right: 10px; }
        .toggle-btn { background: #044; color: #fff; border: 1px solid #0ff; padding: 10px; width: 100%; text-align: left; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 10px; }
        .content { background: rgba(0, 10, 20, 0.9); border: 1px solid #044; padding: 12px; display: none; flex-direction: column; gap: 10px; border-radius: 0 0 4px 4px; margin-top: -1px; }
        .content.open { display: flex; }
        .btn-group { display: flex; flex-direction: column; gap: 4px; }
        .row { display: flex; gap: 4px; }
        button { background: #001520; border: 1px solid #044; color: #0ff; padding: 8px; font-size: 10px; text-transform: uppercase; cursor: pointer; flex: 1; }
        button.active { background: #0ff; color: #000; font-weight: bold; }
        label { font-size: 9px; color: #ccc; text-transform: uppercase; letter-spacing: 1px; }
        input[type=range] { width: 100%; accent-color: #0ff; cursor: pointer; height: 20px; }
        .check-row { display: flex; align-items: center; gap: 8px; font-size: 10px; color: #0ff; cursor: pointer; }
    </style>
</head>
<body>

<div class="panel left-panel">
    <button class="toggle-btn" onclick="togglePanel('left-content')">☰ OBJECTS / NAV</button>
    <div id="left-content" class="content open">
        <div class="btn-group">
            <label>Object Type</label>
            <div class="row">
                <button id="type-star" onclick="setType('star')" class="active">Star</button>
                <button id="type-planet" onclick="setType('planet')">Planet</button>
            </div>
            <button id="type-craft" onclick="setType('craft')" style="color:#0af; border-color:#0af;">Spacecraft</button>
            <button id="type-blackhole" onclick="setType('blackhole')">Black Hole</button>
        </div>
        <div class="btn-group">
            <label>Nav Mode</label>
            <div class="row">
                <button id="nav-pan" onclick="setNav('pan')" class="active">Pan</button>
                <button id="nav-rotate" onclick="setNav('rotate')">Rotate</button>
            </div>
        </div>
        <div class="btn-group">
            <label>Deploy</label>
            <div class="row">
                <button id="mode-static" onclick="setMode('static')" class="active">Static</button>
                <button id="mode-orbital" onclick="setMode('orbital')">Orbit</button>
                <button id="mode-directional" onclick="setMode('directional')">Launch</button>
            </div>
        </div>
        <button onclick="resetSim()" style="color: #f88; border-color: #600;">RESET</button>
    </div>
</div>

<div class="panel right-panel">
    <button class="toggle-btn" onclick="togglePanel('right-content')">⚙ PHYSICS ☰</button>
    <div id="right-content" class="content open">
        <div><label>Sim Speed</label><input type="range" id="speed-slider" min="0" max="2" step="0.1" value="1"></div>
        <div><label>G-Scale</label><input type="range" id="warp-slider" min="1" max="25" step="0.1" value="5"></div>
        <label class="check-row">
            <input type="checkbox" id="trail-toggle" checked> SHOW ORBIT LINES
        </label>
    </div>
</div>

<canvas id="sim"></canvas>

<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');

let objects = [];
let currentType = 'star', currentMode = 'static', currentNav = 'pan', dragMass = 0;
let isPointerDown = false, isRightClick = false, isMiddleClick = false, isMultiTouch = false;
let startX, startY, curX, curY;
let initialPinchDist = 0, initialZoom = 1;
let cam = { x: 0, y: 150, zoom: 0.5, rotX: 1.15, rotZ: 0.5 };

const CONFIG = {
    star: { baseMass: 85000, color: '#ffff00', minSize: 45, lift: 1.0, warpMult: 1.2, reach: 1.2, factor: 15000 },
    planet: { baseMass: 2000, color: '#00ff00', minSize: 10, lift: 0.6, warpMult: 0.12, reach: 0.75, factor: 15000 }, 
    craft: { baseMass: 10, color: '#00ccff', minSize: 4, lift: 0.4, warpMult: 0.0, reach: 0.0, factor: 1 },
    blackhole: { baseMass: 3000000, color: '#000', minSize: 7.5, lift: 0.0, warpMult: 12.0, reach: 0.3, factor: 30000 },
    PHYSICS_G: 2.2, gridSize: 6000, BASE_DEPTH: 380 
};

function togglePanel(id) { document.getElementById(id).classList.toggle('open'); }
function setType(t) { currentType = t; updateUI(); }
function setMode(m) { currentMode = m; updateUI(); }
function setNav(n) { currentNav = n; updateUI(); }
function resetSim() { objects = []; }
function updateUI() {
    document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    if(document.getElementById(`type-${currentType}`)) document.getElementById(`type-${currentType}`).classList.add('active');
    if(document.getElementById(`mode-${currentMode}`)) document.getElementById(`mode-${currentMode}`).classList.add('active');
    if(document.getElementById(`nav-${currentNav}`)) document.getElementById(`nav-${currentNav}`).classList.add('active');
}

function getDepth(ox, oy, gScale) {
    let wz = 0, totalTension = 0;
    const depthMod = 1 + (gScale - 1) * 0.2;
    const reachMod = 1 + (gScale - 1) * 0.45;
    for (let obj of objects) {
        if (obj.type === 'craft' || obj.warpMult === 0) continue;
        let dx = obj.x - ox, dy = obj.y - oy;
        let distSq = dx*dx + dy*dy;
        let massRatio = obj.mass / CONFIG[obj.type].baseMass;
        let effectiveWarp = CONFIG[obj.type].warpMult;
        if (obj.type === 'planet') { effectiveWarp *= Math.min(3.5, Math.pow(massRatio, 0.9)); }
        else if (obj.type === 'star') { effectiveWarp *= (0.8 + Math.sqrt(massRatio) * 0.4); }
        let sigma = ((obj.size * 2.1) + (45 * Math.sqrt(obj.mass / 25000))) * reachMod * CONFIG[obj.type].reach;
        let influence = Math.exp(-distSq / (2 * sigma * sigma));
        wz -= (CONFIG.BASE_DEPTH * depthMod * effectiveWarp) * influence;
        totalTension += influence;
    }
    return { z: wz, tension: Math.min(totalTension, 1) };
}

function project(x, y, z) {
    const x1 = x * Math.cos(cam.rotZ) - y * Math.sin(cam.rotZ);
    const y1 = x * Math.sin(cam.rotZ) + y * Math.cos(cam.rotZ);
    const y2 = y1 * Math.cos(cam.rotX) - z * Math.sin(cam.rotX);
    const zs = y1 * Math.sin(cam.rotX) + z * Math.cos(cam.rotX);
    return { px: (x1 * cam.zoom) + canvas.width/2 + cam.x, py: (y2 * cam.zoom) + canvas.height/2 + cam.y, zs: zs };
}

function screenToWorld(sx, sy) {
    const dxS = (sx - canvas.width/2 - cam.x) / cam.zoom;
    const dyS = (sy - canvas.height/2 - cam.y) / (cam.zoom * Math.cos(cam.rotX));
    return {
        x: dxS * Math.cos(-cam.rotZ) - dyS * Math.sin(-cam.rotZ),
        y: dxS * Math.sin(-cam.rotZ) + dyS * Math.cos(-cam.rotZ)
    };
}

// Fixed Deployment logic
function handleDeploy(sx, sy, cx, cy) {
    const w = screenToWorld(sx, sy);
    let vx = 0, vy = 0;
    
    if (currentMode === 'directional') { 
        vx = (sx - cx) * 0.25; vy = (sy - cy) * 0.25; 
    } else if (currentMode === 'orbital') {
        const staticStars = objects.filter(o => o.isStatic);
        if (staticStars.length > 0) {
            let nearest = staticStars[0];
            let minDist = Math.hypot(w.x - nearest.x, w.y - nearest.y);
            for (let s of staticStars) {
                let d = Math.hypot(w.x - s.x, w.y - s.y);
                if (d < minDist) { nearest = s; minDist = d; }
            }
            const r = minDist;
            if (r > 10) {
                const speed = Math.sqrt((CONFIG.PHYSICS_G * nearest.mass) / r);
                const dx = w.x - nearest.x, dy = w.y - nearest.y;
                vx = -(dy/r) * speed; vy = (dx/r) * speed;
            }
        }
    }
    objects.push({ x: w.x, y: w.y, vx, vy, mass: dragMass, type: currentType, isStatic: (currentMode === 'static'), size: CONFIG[currentType].minSize + (dragMass / CONFIG[currentType].factor), trail: [] });
}

// Event Listeners
window.onmousedown = (e) => {
    if (e.target !== canvas) return;
    startX = e.clientX; startY = e.clientY; curX = e.clientX; curY = e.clientY;
    if (e.button === 0) { isPointerDown = true; dragMass = CONFIG[currentType].baseMass; }
    if (e.button === 1) { isMiddleClick = true; e.preventDefault(); }
    if (e.button === 2) isRightClick = true;
};
window.onmousemove = (e) => {
    if (isRightClick) {
        cam.rotZ += (e.clientX - curX) * 0.01;
        cam.rotX = Math.max(0.1, Math.min(Math.PI/2, cam.rotX + (e.clientY - curY) * 0.01));
    }
    if (isMiddleClick) { cam.x += (e.clientX - curX); cam.y += (e.clientY - curY); }
    curX = e.clientX; curY = e.clientY;
};
window.onmouseup = (e) => {
    if (e.button === 0 && isPointerDown) handleDeploy(startX, startY, curX, curY);
    isPointerDown = isRightClick = isMiddleClick = false;
};
canvas.onwheel = (e) => { e.preventDefault(); cam.zoom *= e.deltaY > 0 ? 0.9 : 1.1; };

canvas.addEventListener('touchstart', (e) => {
    if (e.target !== canvas) return; e.preventDefault();
    if (e.touches.length === 1) {
        isPointerDown = true; startX = e.touches[0].clientX; startY = e.touches[0].clientY;
        curX = startX; curY = startY; dragMass = CONFIG[currentType].baseMass;
    } else if (e.touches.length === 2) {
        isPointerDown = false; isMultiTouch = true;
        initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        initialZoom = cam.zoom;
    }
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isPointerDown) { curX = e.touches[0].clientX; curY = e.touches[0].clientY; }
    else if (e.touches.length === 2 && isMultiTouch) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        cam.zoom = initialZoom * (dist / initialPinchDist);
    }
}, { passive: false });
canvas.addEventListener('touchend', () => {
    if (isPointerDown && !isMultiTouch) handleDeploy(startX, startY, curX, curY);
    isPointerDown = isMultiTouch = false;
});

window.oncontextmenu = (e) => e.preventDefault();
window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };

function update() {
    const simSpeed = parseFloat(document.getElementById('speed-slider').value);
    const gScale = parseFloat(document.getElementById('warp-slider').value);
    const showTrails = document.getElementById('trail-toggle').checked;
    if (isPointerDown) dragMass += (currentType === 'craft' ? 0 : 15000);

    for(let i = 0; i < objects.length; i++) {
        let a = objects[i]; if (a.isStatic) continue;
        for(let j = 0; j < objects.length; j++) {
            if (i === j) continue;
            let b = objects[j]; let dx = b.x - a.x, dy = b.y - a.y, d = Math.sqrt(dx*dx + dy*dy);
            if (d < (a.size + b.size) * 0.45) {
                if (b.type === 'blackhole' || b.mass > a.mass) { if (a.type !== 'craft') b.mass += a.mass; objects.splice(i, 1); i--; break; }
            }
            if (d < 25) continue;
            let f = (CONFIG.PHYSICS_G * a.mass * b.mass) / (d*d);
            a.vx += ((f * dx / d) / a.mass) * simSpeed; a.vy += ((f * dy / d) / a.mass) * simSpeed;
        }
        a.x += a.vx * simSpeed; a.y += a.vy * simSpeed;
        if (showTrails) { a.trail.push({x: a.x, y: a.y}); if (a.trail.length > 80) a.trail.shift(); }
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const res = Math.floor(80 * (1 + (gScale-1) * 0.05));
    const bound = CONFIG.gridSize;
    let gridRows = [];
    for (let i = -bound; i <= bound; i += res) {
        let row = [];
        for (let j = -bound; j <= bound; j += res) { row.push(getDepth(i, j, gScale)); }
        gridRows.push(row);
    }
    for (let i = 0; i < gridRows.length; i++) {
        for (let j = 0; j < gridRows[i].length; j++) {
            const p1 = project((i*res)-bound, (j*res)-bound, gridRows[i][j].z);
            ctx.strokeStyle = `rgb(${gridRows[i][j].tension * 120}, ${68 + gridRows[i][j].tension * 187}, ${102 + gridRows[i][j].tension * 153})`;
            if (i < gridRows.length - 1) { 
                const p2 = project(((i+1)*res)-bound, (j*res)-bound, gridRows[i+1][j].z);
                ctx.beginPath(); ctx.moveTo(p1.px, p1.py); ctx.lineTo(p2.px, p2.py); ctx.stroke(); 
            }
            if (j < gridRows[i].length - 1) { 
                const p3 = project((i*res)-bound, ((j+1)*res)-bound, gridRows[i][j+1].z);
                ctx.beginPath(); ctx.moveTo(p1.px, p1.py); ctx.lineTo(p3.px, p3.py); ctx.stroke(); 
            }
        }
    }

    objects.forEach(obj => {
        const d = getDepth(obj.x, obj.y, gScale);
        const p = project(obj.x, obj.y, d.z + (obj.size * (CONFIG[obj.type].lift || 1)));
        if (showTrails && obj.trail.length > 1) {
            ctx.beginPath(); ctx.strokeStyle = CONFIG[obj.type].color + "55";
            obj.trail.forEach((tp, k) => {
                const tv = getDepth(tp.x, tp.y, gScale);
                const tProj = project(tp.x, tp.y, tv.z);
                if(k===0) ctx.moveTo(tProj.px, tProj.py); else ctx.lineTo(tProj.px, tProj.py);
            });
            ctx.stroke();
        }
        ctx.fillStyle = CONFIG[obj.type].color;
        ctx.beginPath(); ctx.arc(p.px, p.py, obj.size * cam.zoom, 0, Math.PI * 2); ctx.fill();
        if (obj.type === 'craft') { ctx.shadowBlur = 10; ctx.shadowColor = "#0af"; ctx.stroke(); ctx.shadowBlur = 0; }
    });

    if (isPointerDown && !isMultiTouch) {
        const w = screenToWorld(startX, startY);
        let previewColor = "#0f0";
        if (currentMode === 'orbital' && objects.filter(o => o.isStatic).length === 0) { previewColor = "#f88"; }
        ctx.save(); ctx.setLineDash([5, 5]); ctx.strokeStyle = previewColor;
        ctx.beginPath(); ctx.arc(startX, startY, (CONFIG[currentType].minSize + (dragMass/(CONFIG[currentType].factor || 15000)))*cam.zoom, 0, Math.PI*2); ctx.stroke();
        if (currentMode === 'directional') {
            ctx.setLineDash([]); ctx.strokeStyle = '#0ff'; ctx.beginPath();
            ctx.moveTo(startX, startY); ctx.lineTo(startX + (startX - curX), startY + (startY - curY)); ctx.stroke();
        }
        ctx.restore();
    }
    requestAnimationFrame(update);
}
window.onresize(); update(); updateUI();
</script>
</body>
</html>

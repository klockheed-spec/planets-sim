<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>K-SPEC // MOBILE_LAUNCH_RESTORED</title>
    <style>
        body { margin: 0; background: #000; color: #0ff; font-family: sans-serif; overflow: hidden; touch-action: none; height: 100dvh; width: 100vw; }
        canvas { display: block; position: fixed; top: 0; left: 0; }
        .panel { position: absolute; z-index: 100; width: 200px; max-width: 40vw; }
        .left-panel { top: 10px; left: 10px; }
        .right-panel { top: 10px; right: 10px; }
        .toggle-btn { background: #044; color: #fff; border: 1px solid #0ff; padding: 10px; width: 100%; text-align: left; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 10px; }
        .content { background: rgba(0, 10, 20, 0.9); border: 1px solid #044; padding: 12px; display: none; flex-direction: column; gap: 10px; border-radius: 0 0 4px 4px; margin-top: -1px; }
        .content.open { display: flex; }
        .btn-group { display: flex; flex-direction: column; gap: 4px; }
        .row { display: flex; gap: 4px; }
        button { background: #001520; border: 1px solid #044; color: #0ff; padding: 8px; font-size: 10px; text-transform: uppercase; cursor: pointer; flex: 1; }
        button.active { background: #0ff; color: #000; font-weight: bold; }
        label { font-size: 9px; color: #ccc; text-transform: uppercase; letter-spacing: 1px; }
        input[type=range] { width: 100%; accent-color: #0ff; cursor: pointer; height: 20px; }
    </style>
</head>
<body>

<div class="panel left-panel">
    <button class="toggle-btn" onclick="togglePanel('left-content')">☰ OBJECTS / NAV</button>
    <div id="left-content" class="content open">
        <div class="btn-group">
            <label>Object Type</label>
            <div class="row">
                <button id="type-star" onclick="setType('star')" class="active">Star</button>
                <button id="type-planet" onclick="setType('planet')">Planet</button>
            </div>
            <button id="type-blackhole" onclick="setType('blackhole')">Black Hole</button>
        </div>
        <div class="btn-group">
            <label>Nav Mode</label>
            <div class="row">
                <button id="nav-pan" onclick="setNav('pan')" class="active">Pan</button>
                <button id="nav-rotate" onclick="setNav('rotate')">Rotate</button>
            </div>
        </div>
        <div class="btn-group">
            <label>Deploy</label>
            <div class="row">
                <button id="mode-static" onclick="setMode('static')" class="active">Static</button>
                <button id="mode-orbital" onclick="setMode('orbital')">Orbit</button>
                <button id="mode-directional" onclick="setMode('directional')">Launch</button>
            </div>
        </div>
        <button onclick="resetSim()" style="color: #f88; border-color: #600;">RESET</button>
    </div>
</div>

<div class="panel right-panel">
    <button class="toggle-btn" onclick="togglePanel('right-content')">⚙ PHYSICS ☰</button>
    <div id="right-content" class="content open">
        <div><label>Sim Speed</label><input type="range" id="speed-slider" min="0" max="2" step="0.1" value="1"></div>
        <div><label>G-Scale</label><input type="range" id="warp-slider" min="1" max="25" step="0.1" value="5"></div>
    </div>
</div>

<canvas id="sim"></canvas>

<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');

let objects = [];
let currentType = 'star', currentMode = 'static', currentNav = 'pan', dragMass = 0;
let isPointerDown = false, isMultiTouch = false;
let startX, startY, curX, curY;
let initialPinchDist = 0, initialZoom = 1, initialPinchAngle = 0, initialRotZ = 0;
let cam = { x: 0, y: 150, zoom: 0.5, rotX: 1.15, rotZ: 0.5 };

const CONFIG = {
    star: { baseMass: 85000, color: '#ffff00', minSize: 45, lift: 1.0, warpMult: 1.0, reach: 1.0, factor: 15000 },
    planet: { baseMass: 1000, color: '#00ff00', minSize: 10, lift: 0.6, warpMult: 0.2, reach: 0.8, factor: 15000 }, 
    blackhole: { baseMass: 2500000, color: '#000', minSize: 7.5, lift: 0.0, warpMult: 10.0, reach: 0.25, factor: 30000 },
    PHYSICS_G: 2.2, gridSize: 6000, BASE_DEPTH: 360 
};

function togglePanel(id) { document.getElementById(id).classList.toggle('open'); }
function setType(t) { currentType = t; updateUI(); }
function setMode(m) { currentMode = m; updateUI(); }
function setNav(n) { currentNav = n; updateUI(); }
function resetSim() { objects = []; }
function updateUI() {
    document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    if(document.getElementById(`type-${currentType}`)) document.getElementById(`type-${currentType}`).classList.add('active');
    if(document.getElementById(`mode-${currentMode}`)) document.getElementById(`mode-${currentMode}`).classList.add('active');
    if(document.getElementById(`nav-${currentNav}`)) document.getElementById(`nav-${currentNav}`).classList.add('active');
}

function getVertex(ox, oy, gScale) {
    let wz = 0, totalTension = 0;
    const depthMod = 1 + (gScale - 1) * 0.2;
    const reachMod = 1 + (gScale - 1) * 0.45;
    for (let obj of objects) {
        let dx = obj.x - ox, dy = obj.y - oy;
        let distSq = dx*dx + dy*dy;
        let sigma = ((obj.size * 2.0) + (40 * Math.sqrt(obj.mass / 25000))) * reachMod * CONFIG[obj.type].reach;
        let influence = Math.exp(-distSq / (2 * sigma * sigma));
        wz -= (CONFIG.BASE_DEPTH * depthMod * CONFIG[obj.type].warpMult) * influence;
        totalTension += influence;
    }
    const x1 = ox * Math.cos(cam.rotZ) - oy * Math.sin(cam.rotZ);
    const y1 = ox * Math.sin(cam.rotZ) + oy * Math.cos(cam.rotZ);
    const y2 = y1 * Math.cos(cam.rotX) - wz * Math.sin(cam.rotX);
    const zs = y1 * Math.sin(cam.rotX) + wz * Math.cos(cam.rotX);
    return { px: (x1 * cam.zoom) + canvas.width/2 + cam.x, py: (y2 * cam.zoom) + canvas.height/2 + cam.y, zs, tension: Math.min(totalTension, 1), wz: wz };
}

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length === 1) {
        isPointerDown = true; isMultiTouch = false;
        startX = e.touches[0].clientX; startY = e.touches[0].clientY;
        curX = startX; curY = startY;
        dragMass = CONFIG[currentType].baseMass;
    } else if (e.touches.length === 2) {
        isPointerDown = false; isMultiTouch = true;
        initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        initialPinchAngle = Math.atan2(e.touches[1].clientY - e.touches[0].clientY, e.touches[1].clientX - e.touches[0].clientX);
        initialZoom = cam.zoom; initialRotZ = cam.rotZ;
        startX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        startY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isPointerDown) {
        curX = e.touches[0].clientX; curY = e.touches[0].clientY;
    } else if (e.touches.length === 2 && isMultiTouch) {
        if (currentNav === 'pan') {
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            cam.zoom = initialZoom * (dist / initialPinchDist);
            const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            cam.x += midX - startX; cam.y += midY - startY;
            startX = midX; startY = midY;
        } else {
            const angle = Math.atan2(e.touches[1].clientY - e.touches[0].clientY, e.touches[1].clientX - e.touches[0].clientX);
            cam.rotZ = initialRotZ + (angle - initialPinchAngle);
            const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            cam.rotX = Math.max(0.1, Math.min(Math.PI/2, cam.rotX + (midY - startY) * 0.01));
            startY = midY;
        }
    }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    if (isPointerDown && !isMultiTouch) {
        const dxS = (startX - canvas.width/2 - cam.x) / cam.zoom;
        const dyS = (startY - canvas.height/2 - cam.y) / (cam.zoom * Math.cos(cam.rotX));
        const wX = dxS * Math.cos(-cam.rotZ) - dyS * Math.sin(-cam.rotZ);
        const wY = dxS * Math.sin(-cam.rotZ) + dyS * Math.cos(-cam.rotZ);
        let vx = 0, vy = 0;
        if (currentMode === 'directional') { 
            // INCREASED VELOCITY MULTIPLIER (0.25)
            vx = (startX - curX) * 0.25; vy = (startY - curY) * 0.25; 
        } else if (currentMode === 'orbital') {
            const nearest = objects.find(o => o.isStatic);
            if (nearest) {
                const dx = wX - nearest.x, dy = wY - nearest.y, r = Math.sqrt(dx*dx + dy*dy);
                const speed = Math.sqrt((CONFIG.PHYSICS_G * nearest.mass) / r);
                vx = -(dy/r) * speed; vy = (dx/r) * speed;
            }
        }
        objects.push({ x: wX, y: wY, vx, vy, mass: dragMass, type: currentType, isStatic: (currentMode === 'static'), size: CONFIG[currentType].minSize + (dragMass / CONFIG[currentType].factor) });
    }
    isPointerDown = false; isMultiTouch = false;
});

window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

function update() {
    const simSpeed = parseFloat(document.getElementById('speed-slider').value);
    const gScale = parseFloat(document.getElementById('warp-slider').value);
    if (isPointerDown) dragMass += 15000;

    for(let i = 0; i < objects.length; i++) {
        let a = objects[i]; if (a.isStatic) continue;
        for(let j = 0; j < objects.length; j++) {
            if (i === j) continue;
            let b = objects[j]; let dx = b.x - a.x, dy = b.y - a.y, d = Math.sqrt(dx*dx + dy*dy);
            if (d < (a.size + b.size) * 0.5) {
                if (b.type === 'blackhole' || b.mass > a.mass) { b.mass += a.mass; objects.splice(i, 1); i--; break; }
            }
            if (d < 20) continue;
            let f = (CONFIG.PHYSICS_G * a.mass * b.mass) / (d*d);
            a.vx += ((f * dx / d) / a.mass) * simSpeed; a.vy += ((f * dy / d) / a.mass) * simSpeed;
        }
        a.x += a.vx * simSpeed; a.y += a.vy * simSpeed;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const res = Math.floor(85 * (1 + (gScale-1) * 0.05));
    const bound = CONFIG.gridSize;
    let grid = [];
    for (let i = -bound; i <= bound; i += res) {
        let row = [];
        for (let j = -bound; j <= bound; j += res) { row.push(getVertex(i, j, gScale)); }
        grid.push(row);
    }

    for (let i = 0; i < grid.length; i++) {
        for (let j = 0; j < grid[i].length; j++) {
            const p1 = grid[i][j];
            ctx.strokeStyle = `rgb(${p1.tension * 120}, ${68 + p1.tension * 187}, ${102 + p1.tension * 153})`;
            if (i < grid.length - 1) { ctx.beginPath(); ctx.moveTo(p1.px, p1.py); ctx.lineTo(grid[i+1][j].px, grid[i+1][j].py); ctx.stroke(); }
            if (j < grid[i].length - 1) { ctx.beginPath(); ctx.moveTo(p1.px, p1.py); ctx.lineTo(grid[i][j+1].px, grid[i][j+1].py); ctx.stroke(); }
        }
    }

    objects.forEach(obj => {
        const v = getVertex(obj.x, obj.y, gScale);
        const liftValue = obj.size * CONFIG[obj.type].lift;
        const x1 = obj.x * Math.cos(cam.rotZ) - obj.y * Math.sin(cam.rotZ);
        const y1 = obj.x * Math.sin(cam.rotZ) + obj.y * Math.cos(cam.rotZ);
        const y2 = y1 * Math.cos(cam.rotX) - (v.wz + liftValue) * Math.sin(cam.rotX);
        const finalPX = (x1 * cam.zoom) + canvas.width/2 + cam.x;
        const finalPY = (y2 * cam.zoom) + canvas.height/2 + cam.y;
        ctx.fillStyle = CONFIG[obj.type].color;
        ctx.beginPath(); ctx.arc(finalPX, finalPY, obj.size * cam.zoom, 0, Math.PI * 2); ctx.fill();
        if (obj.type === 'blackhole') { ctx.strokeStyle = '#f11'; ctx.stroke(); }
    });

    if (isPointerDown && !isMultiTouch) {
        const currentSize = (CONFIG[currentType].minSize + (dragMass / CONFIG[currentType].factor)) * cam.zoom;
        ctx.save(); ctx.setLineDash([5, 5]);
        ctx.strokeStyle = CONFIG[currentType].color === '#000' ? '#f11' : CONFIG[currentType].color;
        ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(startX, startY, currentSize, 0, Math.PI * 2); ctx.stroke();
        
        // RESTORED SLINGSHOT ARROW
        if (currentMode === 'directional') {
            ctx.setLineDash([]); ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(startX + (startX - curX), startY + (startY - curY));
            ctx.stroke();
        }
        ctx.restore();
    }
    requestAnimationFrame(update);
}

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
update();
updateUI();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>K-SPEC // NEWTONIAN_GRAVITY_CORE</title>
    <style>
        body { margin: 0; background: #000; color: #0ff; font-family: sans-serif; overflow: hidden; touch-action: none; height: 100dvh; width: 100vw; }
        canvas { display: block; position: fixed; top: 0; left: 0; }
        .panel { position: absolute; z-index: 100; width: 200px; max-width: 40vw; pointer-events: auto; }
        .left-panel { top: 10px; left: 10px; }
        .right-panel { top: 10px; right: 10px; }
        .toggle-btn { background: #044; color: #fff; border: 1px solid #0ff; padding: 10px; width: 100%; text-align: left; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 10px; }
        .content { background: rgba(0, 10, 20, 0.9); border: 1px solid #044; padding: 12px; display: none; flex-direction: column; gap: 10px; border-radius: 0 0 4px 4px; margin-top: -1px; }
        .content.open { display: flex; }
        button { background: #001520; border: 1px solid #044; color: #0ff; padding: 8px; font-size: 10px; text-transform: uppercase; cursor: pointer; flex: 1; }
        button.active { background: #0ff; color: #000; font-weight: bold; }
        label { font-size: 9px; color: #ccc; text-transform: uppercase; letter-spacing: 1px; }
        input[type=range] { width: 100%; accent-color: #0ff; cursor: pointer; height: 20px; }
    </style>
</head>
<body>

<div class="panel left-panel">
    <button class="toggle-btn" onclick="togglePanel('left-content')">☰ OBJECTS / NAV</button>
    <div id="left-content" class="content open">
        <div style="display:flex; flex-direction:column; gap:5px;">
            <label>Object Type</label>
            <div style="display:flex; gap:4px;">
                <button id="type-star" onclick="setType('star')" class="active">Star</button>
                <button id="type-planet" onclick="setType('planet')">Planet</button>
            </div>
            <button id="type-blackhole" onclick="setType('blackhole')">Black Hole</button>
        </div>
        <div style="display:flex; flex-direction:column; gap:5px; margin-top:10px;">
            <label>Deploy</label>
            <div style="display:flex; gap:4px;">
                <button id="mode-static" onclick="setMode('static')" class="active">Static</button>
                <button id="mode-orbital" onclick="setMode('orbital')">Orbit</button>
            </div>
            <button id="mode-directional" onclick="setMode('directional')">Launch</button>
        </div>
        <button onclick="resetSim()" style="color: #f88; border-color: #600; margin-top:10px;">RESET SIM</button>
    </div>
</div>

<div class="panel right-panel">
    <button class="toggle-btn" onclick="togglePanel('right-content')">⚙ PHYSICS ☰</button>
    <div id="right-content" class="content open">
        <div><label>Sim Speed</label><input type="range" id="speed-slider" min="0" max="2" step="0.1" value="1"></div>
        <div><label>G-Scale</label><input type="range" id="warp-slider" min="1" max="50" step="1" value="15"></div>
        <label style="display:flex; align-items:center; gap:8px; font-size:10px;">
            <input type="checkbox" id="trail-toggle" checked> SHOW ORBITS
        </label>
    </div>
</div>

<canvas id="sim"></canvas>

<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');

let objects = [];
let currentType = 'star', currentMode = 'static', dragMass = 0;
let isPointerDown = false, isRightClick = false, isMultiTouch = false;
let startX, startY, curX, curY;
let initialPinchDist = 0, initialZoom = 1, initialPinchAngle = 0, initialRotZ = 0;
let cam = { x: 0, y: 150, zoom: 0.5, rotX: 1.15, rotZ: 0.5 };

const CONFIG = {
    star: { baseMass: 100000, color: '#ffff00', minSize: 40, warpMult: 1.0 },
    planet: { baseMass: 2000, color: '#00ff00', minSize: 12, warpMult: 1.0 }, 
    blackhole: { baseMass: 5000000, color: '#000', minSize: 8, warpMult: 5.0 },
    G: 2.2, // Universal Gravitational Constant
    SOFTENING: 25, // Prevents division by zero at center
    VISUAL_SCALING: 0.005 // Scales Newtonian potential to screen pixels
};

function togglePanel(id) { document.getElementById(id).classList.toggle('open'); }
function setType(t) { currentType = t; updateUI(); }
function setMode(m) { currentMode = m; updateUI(); }
function resetSim() { objects = []; }
function updateUI() {
    document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    document.getElementById(`type-${currentType}`).classList.add('active');
    document.getElementById(`mode-${currentMode}`).classList.add('active');
}

// NEWTONIAN POTENTIAL LOGIC
function getNewtonianDepth(ox, oy, gScale) {
    let potential = 0;
    let totalTension = 0;
    for (let obj of objects) {
        let dx = obj.x - ox, dy = obj.y - oy;
        let r = Math.sqrt(dx*dx + dy*dy);
        
        // Newton's Law Falloff: V = -G * M / (r + softening)
        let influence = (CONFIG.G * obj.mass * obj.warpMult) / (r + CONFIG.SOFTENING);
        potential -= influence;
        
        // Use a standard Gaussian for grid coloring/tension only
        totalTension += Math.exp(-(r*r) / (200 * 200));
    }
    return { z: potential * gScale * CONFIG.VISUAL_SCALING, tension: Math.min(totalTension, 1) };
}

function project(x, y, z) {
    const x1 = x * Math.cos(cam.rotZ) - y * Math.sin(cam.rotZ);
    const y1 = x * Math.sin(cam.rotZ) + y * Math.cos(cam.rotZ);
    const y2 = y1 * Math.cos(cam.rotX) - z * Math.sin(cam.rotX);
    const zs = y1 * Math.sin(cam.rotX) + z * Math.cos(cam.rotX);
    return { px: (x1 * cam.zoom) + canvas.width/2 + cam.x, py: (y2 * cam.zoom) + canvas.height/2 + cam.y, zs: zs };
}

// Input Handling
window.onmousedown = (e) => {
    if (e.target !== canvas) return;
    startX = e.clientX; startY = e.clientY; curX = e.clientX; curY = e.clientY;
    if (e.button === 0) { isPointerDown = true; dragMass = CONFIG[currentType].baseMass; }
    if (e.button === 2) isRightClick = true;
};
window.onmousemove = (e) => {
    if (isRightClick) {
        cam.rotZ += (e.clientX - curX) * 0.01;
        cam.rotX = Math.max(0.1, Math.min(Math.PI/2, cam.rotX + (e.clientY - curY) * 0.01));
    }
    curX = e.clientX; curY = e.clientY;
};
window.onmouseup = (e) => {
    if (e.button === 0 && isPointerDown) handleDeploy(startX, startY, curX, curY);
    isPointerDown = isRightClick = false;
};
canvas.onwheel = (e) => { cam.zoom *= e.deltaY > 0 ? 0.9 : 1.1; };

canvas.addEventListener('touchstart', (e) => {
    if (e.target !== canvas) return; e.preventDefault();
    if (e.touches.length === 1) {
        isPointerDown = true; startX = e.touches[0].clientX; startY = e.touches[0].clientY;
        curX = startX; curY = startY; dragMass = CONFIG[currentType].baseMass;
    } else if (e.touches.length === 2) {
        isPointerDown = false; isMultiTouch = true;
        initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        initialZoom = cam.zoom;
    }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isPointerDown) { curX = e.touches[0].clientX; curY = e.touches[0].clientY; }
    else if (e.touches.length === 2 && isMultiTouch) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        cam.zoom = initialZoom * (dist / initialPinchDist);
    }
}, { passive: false });

canvas.addEventListener('touchend', () => {
    if (isPointerDown && !isMultiTouch) handleDeploy(startX, startY, curX, curY);
    isPointerDown = isMultiTouch = false;
});

function handleDeploy(sx, sy, cx, cy) {
    const dxS = (sx - canvas.width/2 - cam.x) / cam.zoom;
    const dyS = (sy - canvas.height/2 - cam.y) / (cam.zoom * Math.cos(cam.rotX));
    const wX = dxS * Math.cos(-cam.rotZ) - dyS * Math.sin(-cam.rotZ);
    const wY = dxS * Math.sin(-cam.rotZ) + dyS * Math.cos(-cam.rotZ);
    let vx = 0, vy = 0;
    if (currentMode === 'directional') { vx = (sx - cx) * 0.25; vy = (sy - cy) * 0.25; }
    else if (currentMode === 'orbital') {
        const nearest = objects.reduce((prev, curr) => Math.hypot(wX-curr.x, wY-curr.y) < Math.hypot(wX-prev.x, wY-prev.y) ? curr : prev, objects[0]);
        if (nearest) {
            const dx = wX - nearest.x, dy = wY - nearest.y, r = Math.sqrt(dx*dx + dy*dy);
            const speed = Math.sqrt((CONFIG.G * nearest.mass) / r);
            vx = -(dy/r) * speed; vy = (dx/r) * speed;
        }
    }
    objects.push({ x: wX, y: wY, vx, vy, mass: dragMass, type: currentType, isStatic: (currentMode === 'static'), size: CONFIG[currentType].minSize + (dragMass / 20000), trail: [], warpMult: CONFIG[currentType].warpMult });
}

window.oncontextmenu = (e) => e.preventDefault();
window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };

function update() {
    const simSpeed = parseFloat(document.getElementById('speed-slider').value);
    const gScale = parseFloat(document.getElementById('warp-slider').value);
    const showTrails = document.getElementById('trail-toggle').checked;
    if (isPointerDown) dragMass += 25000;

    for(let i = 0; i < objects.length; i++) {
        let a = objects[i]; if (a.isStatic) continue;
        for(let j = 0; j < objects.length; j++) {
            if (i === j) continue;
            let b = objects[j]; let dx = b.x - a.x, dy = b.y - a.y, d = Math.sqrt(dx*dx + dy*dy);
            if (d < (a.size + b.size) * 0.4) {
                if (b.type === 'blackhole' || b.mass > a.mass) { b.mass += a.mass; b.size += a.size * 0.1; objects.splice(i, 1); i--; break; }
            }
            if (d < 30) continue;
            let f = (CONFIG.G * a.mass * b.mass) / (d*d);
            a.vx += (f * dx / d) / a.mass * simSpeed; a.vy += (f * dy / d) / a.mass * simSpeed;
        }
        a.x += a.vx * simSpeed; a.y += a.vy * simSpeed;
        if (showTrails) { a.trail.push({x: a.x, y: a.y}); if (a.trail.length > 50) a.trail.shift(); } else { a.trail = []; }
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const res = 110; 
    const bound = 4500;
    for (let i = -bound; i <= bound; i += res) {
        ctx.beginPath();
        for (let j = -bound; j <= bound; j += res) {
            const d = getNewtonianDepth(i, j, gScale);
            const p = project(i, j, d.z);
            ctx.strokeStyle = `rgb(${d.tension * 150}, ${80 + d.tension * 175}, ${110 + d.tension * 145})`;
            if (j === -bound) ctx.moveTo(p.px, p.py); else ctx.lineTo(p.px, p.py);
        }
        ctx.stroke();
    }
    for (let j = -bound; j <= bound; j += res) {
        ctx.beginPath();
        for (let i = -bound; i <= bound; i += res) {
            const d = getNewtonianDepth(i, j, gScale);
            const p = project(i, j, d.z);
            ctx.strokeStyle = `rgb(${d.tension * 150}, ${80 + d.tension * 175}, ${110 + d.tension * 145})`;
            if (i === -bound) ctx.moveTo(p.px, p.py); else ctx.lineTo(p.px, p.py);
        }
        ctx.stroke();
    }

    objects.forEach(obj => {
        const d = getNewtonianDepth(obj.x, obj.y, gScale);
        const p = project(obj.x, obj.y, d.z + (obj.size * 0.8));
        if (showTrails && obj.trail.length > 1) {
            ctx.beginPath(); ctx.strokeStyle = obj.color + "66";
            obj.trail.forEach((tp, k) => {
                const tv = getNewtonianDepth(tp.x, tp.y, gScale);
                const tProj = project(tp.x, tp.y, tv.z);
                if(k===0) ctx.moveTo(tProj.px, tProj.py); else ctx.lineTo(tProj.px, tProj.py);
            });
            ctx.stroke();
        }
        ctx.fillStyle = obj.color; ctx.beginPath(); ctx.arc(p.px, p.py, obj.size * cam.zoom, 0, Math.PI * 2); ctx.fill();
        if (obj.type === 'blackhole') { ctx.strokeStyle = '#f00'; ctx.lineWidth = 2; ctx.stroke(); }
    });

    if (isPointerDown && !isMultiTouch) {
        ctx.save(); ctx.setLineDash([5, 5]); ctx.strokeStyle = CONFIG[currentType].color;
        ctx.beginPath(); ctx.arc(startX, startY, (CONFIG[currentType].minSize + (dragMass/20000))*cam.zoom, 0, Math.PI*2); ctx.stroke();
        if (currentMode === 'directional') {
            ctx.setLineDash([]); ctx.strokeStyle = '#0ff'; ctx.beginPath();
            ctx.moveTo(startX, startY); ctx.lineTo(startX + (startX - curX), startY + (startY - curY)); ctx.stroke();
        }
        ctx.restore();
    }
    requestAnimationFrame(update);
}
window.onresize(); update(); updateUI();
</script>
</body>
</html>
